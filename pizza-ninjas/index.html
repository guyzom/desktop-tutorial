<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="צבי נינג'ה 3D" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>צבי נינג'ה 3D — הרפתקה בביוב</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Bungee&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <canvas id="c3d"></canvas>

    <div id="ui">
      <section id="screen-start" class="screen active">
        <header class="hero-brand">
          <p class="eyebrow">תלת־מימד אמיתי · לגיל 4+</p>
          <h1>צבי נינג'ה</h1>
          <p class="subtitle">3D · הרפתקה בביוב</p>
          <p class="tagline">גררו · נצחו ברוקולי · כוחות על!</p>
        </header>
        <button id="btn-start" class="big-btn pulse" type="button">בוא נשחק!</button>
      </section>

      <section id="screen-pick" class="screen">
        <h2 class="screen-title">בחרו צב נינג'ה!</h2>
        <div class="turtle-grid" id="turtle-grid"></div>
        <button id="btn-back-start" class="ghost-btn" type="button">חזרה</button>
      </section>

      <section id="screen-map" class="screen">
        <header class="map-header">
          <h2 class="screen-title">מפת הביוב</h2>
          <p class="map-turtle-label" id="map-turtle-label"></p>
        </header>
        <div class="map-board" id="map-board"></div>
        <div class="map-actions">
          <button id="btn-stickers" class="ghost-btn" type="button">מדבקות</button>
          <button id="btn-map-repick" class="ghost-btn" type="button">החלפת צב</button>
        </div>
      </section>

      <section id="screen-stickers" class="screen">
        <h2 class="screen-title">אלבום מדבקות</h2>
        <div class="sticker-grid" id="sticker-grid"></div>
        <button id="btn-stickers-back" class="ghost-btn" type="button">חזרה</button>
      </section>

      <section id="screen-game" class="screen">
        <div class="hud">
          <div class="hud-pill" id="hearts">❤❤❤</div>
          <div class="hud-pill" id="pizza-count">🍕 0</div>
          <div class="hud-pill" id="stage-label">1-1</div>
          <div class="hud-pill boss-pill" id="boss-hp" hidden></div>
          <button id="btn-pause" class="hud-btn" type="button" aria-label="השהה">⏸</button>
        </div>
        <div id="stage-banner" class="stage-banner" hidden></div>
        <button id="btn-super" class="super-btn" type="button" disabled>
          <span class="super-ring" id="super-ring"></span>
          <span id="super-label">כוח על</span>
        </button>
        <div id="toast" class="toast" hidden></div>
        <p class="drag-hint" id="drag-hint">גררו למעלה ולמטה!</p>
      </section>

      <section id="screen-pause" class="screen overlay-screen">
        <div class="overlay-card">
          <h2>הפסקה</h2>
          <p id="pause-stats"></p>
          <button id="btn-resume" class="big-btn" type="button">ממשיכים!</button>
          <button id="btn-exit-map" class="ghost-btn" type="button">יציאה למפה</button>
        </div>
      </section>

      <section id="screen-clear" class="screen overlay-screen">
        <div class="overlay-card">
          <h2 id="clear-title">כל הכבוד!</h2>
          <div class="stars-row" id="stars-row">⭐⭐⭐</div>
          <p id="clear-stats"></p>
          <button id="btn-clear-continue" class="big-btn" type="button">המשך</button>
        </div>
      </section>

      <section id="screen-retry" class="screen overlay-screen">
        <div class="overlay-card">
          <h2>בואו ננסה שוב!</h2>
          <p>אין בעיה — אתם נינג'ות!</p>
          <button id="btn-retry" class="big-btn" type="button">נסו שוב</button>
          <button id="btn-retry-map" class="ghost-btn" type="button">יציאה למפה</button>
        </div>
      </section>

      <div id="celebration" class="celebration" hidden>
        <div class="cele-text" id="cele-text">קואבונגה!!!</div>
      </div>
    </div>
  </div>

  <script src="vendor/three.min.js"></script>
  <script src="meshes.js"></script>
  <script src="game.js"></script>
</body>
</html>
