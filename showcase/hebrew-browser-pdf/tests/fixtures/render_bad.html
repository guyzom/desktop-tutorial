<!doctype html>
<html lang="he" dir="rtl"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../assets/css/base.css">
<style>@page{size:A4;margin:18mm} .bad{unicode-bidi:bidi-override;direction:rtl}</style></head>
<body>
<!-- KNOWN-BAD fixture for the render-gate. The .bad span forces a Latin word to
     render RIGHT-TO-LEFT (bidi-override), i.e. visually reversed "Datapath" ->
     "htapataD" at the glyph level. The render-gate must FIRE on this. -->
<p>צומת עם לטינית הפוכה: <span class="bad">Datapath</span> — אמור להתפוס.</p>
<p>עוד אחד: <span class="bad">CONTROL</span>.</p>
<!-- a correctly-isolated Latin run in the same doc — the gate must NOT flag it -->
<p>לטינית תקינה: <span class="en">Datapath</span> — לא אמור להתפוס.</p>
</body></html>
